name: Installer CI
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "scripts/install.sh"
      - "scripts/dev-install.sh"
      - "scripts/make_manifest.py"
      - "scripts/publish_release.py"
      - "tests/installer/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/installer-ci.yml"

concurrency:
  group: installer-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: bash -n scripts/install.sh scripts/dev-install.sh tests/installer/run_tests.sh
      - name: shellcheck
        run: shellcheck -S style scripts/install.sh scripts/dev-install.sh tests/installer/run_tests.sh
      - name: python syntax check
        run: python3 -m py_compile scripts/make_manifest.py scripts/publish_release.py

  # macOS matters here beyond os coverage: its stock /bin/bash is 3.2, which
  # is what test_tty_install needs to catch set -u empty-array regressions
  # (fatal on bash < 4.4, invisible on Linux CI's modern bash).
  hermetic-tests:
    name: hermetic-tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: run install.sh hermetic scenarios (no external network)
        run: tests/installer/run_tests.sh

  release-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make_manifest renders (validates uv pin + sha fetch)
        run: |
          touch dummy.whl
          python3 scripts/make_manifest.py --version 0.0.0 --wheel dummy.whl --out /tmp/m
          grep -q '^LATEST=0.0.0$' /tmp/m/manifest.env
          python3 -c "import json; json.load(open('/tmp/m/manifest.json'))"
      - name: publish_release dry-runs
        run: python3 scripts/publish_release.py 0.0.0 --dry-run

  # Builds THIS PR's wheel so the OS matrix exercises the PR's install.sh AND
  # its dependency closure (a dep without wheels for a target — e.g. musl —
  # fails here, the way psutil<7 did).
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynamic-versioning needs history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build wheel
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry self add "poetry-dynamic-versioning[plugin]"
          poetry build --format wheel
      - uses: actions/upload-artifact@v4
        with:
          name: pr-wheel
          path: dist/vastai-*.whl

  # Footprint ratchet: install THIS PR's closure and fail if it grew > 5% over
  # the committed baseline. A CLI shouldn't quietly balloon (transformers added
  # ~138 MiB via #424). On a real increase the dev either slims the PR or bumps
  # tests/installer/footprint_baseline.env deliberately — the diff records intent.
  # Hermetic uv measure on one canonical platform (linux x86_64); the per-package
  # denylist in tests/test_dependency_budget.py covers the cross-platform angle.
  footprint-budget:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pr-wheel
          path: dist
      - name: install uv
        # Pinned to the same uv the release manifest ships (make_manifest.py).
        run: curl -LsSf https://astral.sh/uv/0.11.21/install.sh | sh
      - name: measure dependency footprint vs baseline (+5% ratchet)
        run: |
          set -euo pipefail
          . tests/installer/footprint_baseline.env
          export PATH="$HOME/.local/bin:$PATH"
          uv venv /tmp/fp --python 3.12 --quiet
          uv pip install --python /tmp/fp/bin/python --quiet dist/vastai-*.whl
          # Ask the venv's own interpreter for site-packages — one deterministic
          # path, vs. a find that could match zero or several dirs.
          SITE="$(/tmp/fp/bin/python -c 'import sysconfig; print(sysconfig.get_paths()["purelib"])')"
          BYTES="$(du -sb "$SITE" | cut -f1)"
          CEIL=$(( FOOTPRINT_BASELINE_BYTES * 105 / 100 ))
          PCT=$(( (BYTES - FOOTPRINT_BASELINE_BYTES) * 100 / FOOTPRINT_BASELINE_BYTES ))
          printf 'footprint: %d MiB | baseline: %d MiB | delta: %d%% | ceiling(+5%%): %d MiB\n' \
            $((BYTES/1048576)) $((FOOTPRINT_BASELINE_BYTES/1048576)) "$PCT" $((CEIL/1048576))
          if [ "$BYTES" -gt "$CEIL" ]; then
            echo "::error::dependency footprint grew ${PCT}% (>5%). Slim the PR, or bump FOOTPRINT_BASELINE_BYTES in tests/installer/footprint_baseline.env deliberately."
            exit 1
          fi

  # Real end-to-end install across the OS matrix — the prebuilt-runtime promise.
  # The release manifest (uv pin, CPython) comes from the published Release;
  # VASTAI_PIP_SPEC overrides the wheel to this PR's build. Linux variants run in
  # containers on the ubuntu host (checkout stays on the host, repo is mounted —
  # avoids the actions/checkout-on-musl node problem); macOS runs natively.
  os-matrix:
    needs: build-wheel
    name: install (${{ matrix.name }})
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: alpine-musl, image: "alpine:latest",      prep: "apk add --no-cache bash curl" }
          - { name: debian-slim, image: "debian:stable-slim", prep: "apt-get update -qq && apt-get install -y -qq curl ca-certificates" }
          # ubuntu:20.04 == the floor (glibc 2.31): proves install works AT the
          # minimum supported glibc. The sub-floor bail is covered by the hermetic
          # test_glibc_floor (VASTAI_GLIBC_FLOOR=99.0), not by a matrix image.
          - { name: glibc-floor-min, image: "ubuntu:20.04",   prep: "apt-get update -qq && apt-get install -y -qq curl ca-certificates" }
          - { name: macos,       os: "macos-latest" }
    env:
      VASTAI_CLI_BASE_URL: https://github.com/vast-ai/vast-cli/releases/latest/download
      VASTAI_NO_MODIFY_PATH: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pr-wheel
          path: dist
      - name: install in Linux container
        if: ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            -e VASTAI_CLI_BASE_URL -e VASTAI_NO_MODIFY_PATH \
            "${{ matrix.image }}" sh -c '
              ${{ matrix.prep }}
              VASTAI_PIP_SPEC="$(ls dist/vastai-*.whl)" bash scripts/install.sh
              "$HOME/.vastai/bin/vastai" --version
            '
      - name: install natively (macOS)
        if: ${{ !matrix.image }}
        run: |
          VASTAI_PIP_SPEC="$(ls dist/vastai-*.whl)" bash scripts/install.sh
          "$HOME/.vastai/bin/vastai" --version
