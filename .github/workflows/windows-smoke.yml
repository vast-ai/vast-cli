name: Windows smoke test

on:
  push:
    branches: [fix-windows-home-env]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Smoke test — CLI loads and --help runs
        run: python vast.py --help

      - name: Fallback test — simulate xdg ImportError with HOME unset
        shell: pwsh
        run: |
          Remove-Item Env:HOME -ErrorAction SilentlyContinue
          python -c @"
          import sys
          sys.modules['xdg'] = None  # forces ImportError on `import xdg`
          import os
          from pathlib import Path
          exec('''
          APP_NAME = \"vastai\"
          try:
              import xdg
              DIRS = {\"config\": xdg.xdg_config_home(), \"temp\": xdg.xdg_cache_home()}
              raise SystemExit(\"unexpected: xdg import succeeded\")
          except Exception:
              _home = str(Path.home())
              DIRS = {
                  \"config\": os.path.join(_home, \".config\"),
                  \"temp\": os.path.join(_home, \".cache\"),
              }
              print(\"fallback DIRS:\", DIRS)
              assert _home, \"Path.home() returned empty\"
              assert os.path.isabs(_home), f\"home not absolute: {_home}\"
          ''')
          "@
