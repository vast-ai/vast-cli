name: PyPI Publish
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
jobs:
  build_and_publish_vastai:
    name: Publish vastai
    runs-on: ubuntu-latest
    permissions:
      contents: write  # publish_release.py creates/updates the GitHub Release
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git history with dynamic versioning
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install poetry and plugins
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry self add "poetry-dynamic-versioning[plugin]"
      - name: install dependencies
        run: poetry install --no-interaction --no-root
      - name: build and publish vastai to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          poetry config pypi-token.pypi "$PYPI_API_TOKEN"
          poetry publish --build
      # Installer side: hash the just-built dist/ wheel, render the manifest,
      # and attach wheel + manifest.{json,env} + install.sh to a draft Release
      # published only once fully populated (installs fetch the wheel from the
      # Release, not PyPI). The vast.ai redirects serve
      # releases/latest/download/*, so this is the deploy.
      - name: publish installer manifest + release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/publish_release.py "$VERSION" --ci --yes --skip-verify

  build_and_publish_vastai_sdk:
    name: Publish vastai-sdk
    needs: build_and_publish_vastai
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install poetry and plugins
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry self add "poetry-dynamic-versioning[plugin]"
      - name: pin vastai dependency to this release version
        working-directory: sdk-wrapper
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/vastai = \">=0.1.0\"/vastai = \"==${VERSION}\"/" pyproject.toml
      - name: build and publish vastai-sdk to PyPI
        env:
          PYPI_API_TOKEN_SDK: ${{ secrets.PYPI_API_TOKEN_SDK }}
        working-directory: sdk-wrapper
        run: |
          poetry config pypi-token.pypi "$PYPI_API_TOKEN_SDK"
          poetry publish --build

  # Confirm the just-attached Release assets are fetchable, parse, and match the
  # tag. Install coverage lives in the PR-time installer-ci OS matrix.
  verify_release_assets:
    name: Verify release assets
    needs: build_and_publish_vastai
    continue-on-error: true  # non-blocking canary until proven
    runs-on: ubuntu-latest
    steps:
      - name: release assets attached, parse, and match this version
        env:
          BASE: https://github.com/vast-ai/vast-cli/releases/latest/download
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL --retry 3 "$BASE/install.sh"    -o /tmp/install.sh
          curl -fsSL --retry 3 "$BASE/manifest.env"  -o /tmp/manifest.env
          curl -fsSL --retry 3 "$BASE/manifest.json" -o /tmp/manifest.json
          grep -q 'Vast.ai CLI installer' /tmp/install.sh
          grep -qx "LATEST=$VERSION" /tmp/manifest.env
          python3 -c "import json; d=json.load(open('/tmp/manifest.json')); assert d['latest']=='$VERSION', d['latest']"
          # Confirm the wheel installers will fetch is live and byte-correct.
          WHEEL_URL="$(sed -n 's/^WHEEL_URL=//p' /tmp/manifest.env)"
          WHEEL_SHA="$(sed -n 's/^WHEEL_SHA256=//p' /tmp/manifest.env)"
          test -n "$WHEEL_URL" && test -n "$WHEEL_SHA"
          curl -fsSL --retry 3 "$WHEEL_URL" -o /tmp/release.whl
          echo "$WHEEL_SHA  /tmp/release.whl" | sha256sum -c -
          echo "release assets for $VERSION are attached, parse, match, and the wheel is fetchable + hash-verified"
